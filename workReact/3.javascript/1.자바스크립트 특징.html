<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.자바스크립트 특징.html</title>
    <script>
        alert("자바 스크립트 실행 중...") //alert("출력내용") 간단한 경고
        /* 여러줄 주석 */
    </script>
</head>
<body>
    <script>
        alert('또 실종...') //문자열 '' 또는 "" 가능 
    </script>
    <section>
        <article>
            <ol>
                <li>브라우저에서 실행(run)이 되는 언어(html)</li>
                <li>head,body에서 script태그로 소스코드 작성(주로 head에서)</li>
                <li>문법에 맞게 내용을 작성한 파일(source file).js</li>
                <li>ㅈ바스크립트는 컴파일 과정이 없이 실행되는 언어</li>
                <li>디버깅(=에러잡기)이 어렵다.</li>
                <li>플랫폼에 상관없이 다 실행이 된다.</li>
                <li>경우에 따라서는 파일로 불러와서 실행이 되기도 한다.</li>
            </ol>
        </article>
    </section>
</body>
</html>
