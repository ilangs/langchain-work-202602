<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="disp"></div>
  <!-- id값은 무조건 ROOT만 쓰는 것은 아니다. -->

  <script type="text/babel">
    //  함수형 컴포넌트
    function App() {
      const r = Math.floor(Math.random() * 3); // 난수발생기(0.~0.9999)*3 -> 0,1,other 출력

      if (r === 0) return <h1>오늘도 즐거운 하루 되세요</h1>;  // 0인 경우
      if (r === 1) return <h1>안녕하세요 리액트!!</h1>;       // 1인 경우
      return <h1>날씨가 좋네요</h1>;                         // 0과 1이 아닌 경우
    }
    // document.getElementById("id값(disp)")
    const rootElement = document.querySelector('#disp'); // (#id값)
    const root = ReactDOM.createRoot(rootElement);

    // 컴포넌트 렌더링
    root.render(<App />);
  </script>
</body>
</html>
