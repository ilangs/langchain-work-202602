<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Tailwind 기초 실습3</title>
</head>
<body class="bg-gray-100 p-10">
    <!-- border-4(두꺼운 태두리 4px) -->
   <div class="bg-yellow-100 p-10 border-4 border-yellow-500">
        마진(바깥 여백)과 패딩(안쪽 여백)을 구분해 보세요.
        <!-- p-4(내부여백 16px) m-5(외부여백 20px)-->
        <div class="bg-white p-4 m-5 border-2 border-blue-500">
            마진(바깥 여백)과 패딩(안쪽 여백)을 구분해 보세요.
        </div>
    </div>
</body> 
</html>
