<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 2.css\1.tailwind.html (소스링크 ctrl+눌러서 연결여부 확인) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Tailwind 기초 실습1</title>
</head>
<!-- bg-gray-100(전체 베경은 연회색), p-10(body내부 전체에 큰 여백 40px)  -->
<body class="bg-gray-100 p-10">
    <!-- p-8(안쪽여백 약 32px) round-lg(둥근 모서리) shadow-md(중간정도의 그림자 효과) 
     md-6 (아래쪽 바깥 여백(margin-bottom 약 24px))-->
    <div class="bg-white p-8 rounded-lg shadow-md mb-6">
        <!-- text-2xl(큰 글자크기 24px) font-bold(굵은글자) 
         text-blue-600(진한 파란색 글자) mb-2 (아래쪽 바깥 여백 8px)-->
        <h1 class="text-2xl font-bold text-blue-600 mb-2">안녕하세요! AI 팀장입니다.</h1>
        <!-- text-gray-600 (진한 회색 글자) -->
        <p class="text-gray-600">
            이 상자는 흰색 배경(bg-white), 내부 여백(p-8), 둥근 모서리(rounded-lg), 그림자(shadow-md)
        </p>
    </div>
</body> <!--  **bg(배경), p(안쪽 여백), text(글자 크기/색상) -->
</html>
