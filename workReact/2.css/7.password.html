<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기</title>
    <!-- cdn -->
     <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<!-- items-center(세로 방향 가운데 정렬)  justify-center(가로 방향 가운데 정렬) h-screen(화면 전체 높이 차) -->
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <!-- 로그인 박스 -->
     <!-- shadow-lg(큰 그림자효과) rounded-lg(모서리 둥글게) p-8(안쪽여백 2rem) w-full(가로전체) 
          max-w-sm (최대 너비:작은 박스 크기)-->
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-sm">
        <h2 class="text-2xl font-bold text-center mb-6">비밀번호 찾기</h2>

        <!-- 가입한 이메일-->
        <!-- div>label{가입한 이메일}+input -->
          <div class="mb-4">
            <label class="block text-gray-700 mb-2" for="username">가입한 이메일</label>
            <!-- px-3 py-2 좌우 0.75rem ,상하 0.5rem 여백 rounded (모서리 둥글게)-->
            <input type="email" id="username" placeholder="이메일 입력"
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>

        <!-- 버튼 -->
         <!-- button{비밀번호 재설정 링크 보내기} -->
          <button class="w-full bg-blue-400 text-white py-2 rounded hover:bg-blue-500 transition">비밀번호 재설정 링크 보내기</button>

        <!-- 로그인으로 돌아가기 -->
        <!-- div>a{로그인으로 돌아가기} -->
         <!-- justify-center(중앙에 배치) mt-4(위쪽여백) text-sm(작은 글자 크기)-->
        <div class="flex justify-center mt-4 text-sm text-blue-600">
            <a href="5.login.html">로그인으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
