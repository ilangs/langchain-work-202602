<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8.div,span태그의 차이점.html</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* 
        div 1.줄바꿈이 자동으로 일어나는 태그(block태그) ex)Hn태그
            2.영역을 설정할때 주로 사용(width,height) O
            3.한라인을 최대로 확대해서 사용=>block태그특성중 하나


        span 1.줄바꿈이 자동으로 일어나지 않는 태그(inline태그)
                    ->수동(br,p)
             2.width,height을 잘사용X =>화면상에 에러메세지출력시
                                        (jQuery)
             3.글자가 있는 부분까지만 최소한으로 축소해서 사용
              (inline태그 특성)
              display=>화면에 보여주는 속성
               ex) block,inline,
               inline-block(두개의 특성)=>가로로 정렬,width,
                                          height을 사용
                                          ex)상품진열
        */
        div{background:green;
            width:200px;
            height:50px;
            /*display:inline; */
        }
        span{
            background:yellow;
            width:200px;
            height:50px;
            /*display:block; */
        }
    </style>
</head>
<body>
    <h1>DIV태그와 SPAN태그의 차이</h1>
    <!-- div*n =>n개의 div태그 생성 -->
    <div>div태그 연습입니다.</div>
    <div>div태그 연습2입니다.</div>
    <div>div태그 연습3입니다.</div> 

    <!-- span{span태그 연습입니다.}*3 -->
    <span>span태그 연습입니다.</span>
    <span>span태그 연습2입니다.</span>
    <span>span태그 연습3입니다.</span>
   
    <br><br>
    <!-- 
    div 1. 줄바꿈이 자동으로 일어나는 태그 (block 태그) ex) Hn태그
            → Tailwind: 기본 div는 block이므로 별도 클래스 불필요
        2. 영역 설정 가능 (width, height) → w-[200px] h-[50px]
        3. 한 라인을 최대로 확대해서 사용 → 아래 예시에서 display:inline 적용
            → Tailwind: inline

    span 1. 줄바꿈이 자동으로 일어나지 않는 태그 (inline 태그)
                → 수동 줄바꿈: br, p 태그 사용
            2. width, height 기본 적용 안 됨 → 아래 예시에서 display:block 적용
                → Tailwind: block, w-[200px] h-[50px]
            3. 글자가 있는 부분까지만 최소한으로 축소해서 사용 (inline 특성)
            
            display 속성 종류:
            block        → 한 줄 전체 차지, width/height 사용 가능
            inline       → 콘텐츠 크기만큼만 차지, width/height 무시
            inline-block → 가로 정렬 + width/height 사용 가능 (ex. 상품 진열)
     -->
    
    <h1>DIV태그와 SPAN태그의 차이</h1>
    <!-- div*n => n개의 div태그 생성 -->
    <!--
        bg-green-500  : 배경색을 초록색으로 설정 (background: green)
        w-[200px]     : 너비 200px 설정 (width: 200px)
        h-[50px]      : 높이 50px 설정 (height: 50px)
        inline        : 블록 요소인 div를 인라인으로 변경 (display: inline)
    -->
    <div class="bg-green-500 w-[200px] h-[50px]">div태그 연습입니다.</div>
    <div class="bg-green-500 w-[200px] h-[50px] inline">div태그 연습2입니다.</div>
    <div class="bg-green-500 w-[200px] h-[50px] inline">div태그 연습3입니다.</div>
    <br><br><!-- inline div들 이후 줄바꿈 -->

    <!-- span{span태그 연습입니다.}*3 -->
    <!--
        bg-yellow-300 : 배경색을 노란색으로 설정 (background: yellow)
        w-[200px]     : 너비 200px 설정 (width: 200px) — block 지정 시 적용됨
        h-[50px]      : 높이 50px 설정 (height: 50px) — block 지정 시 적용됨
        block         : 인라인 요소인 span을 블록으로 변경 (display: block)
    -->
    <span class="bg-yellow-300 w-[200px] h-[50px]">span태그 연습입니다.</span>
    <span class="bg-yellow-300 w-[200px] h-[50px] block">span태그 연습2입니다.</span>
    <span class="bg-yellow-300 w-[200px] h-[50px] block">span태그 연습3입니다.</span>
</body>
</html>
