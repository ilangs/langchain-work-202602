<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 영화 심리 처방전</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>🎬 영화별 맞춤 심리 처방 에이전트</header>
  
  <main>
    <div id="chat-box"></div> <div id="input-area">
      <input type="text" id="prompt" placeholder="지금 기분은 어떤가요?..." onkeypress="if(event.keyCode==13) sendMessage()">
      <button onclick="sendMessage()">처방받기</button>
    </div>
  </main>

  <script>
    function addMessage(movies, sender) {//감정멘트(영화) 누가 보냈는지(user)
      const box = document.getElementById("chat-box");
      const msgDiv = document.createElement("div");//div태그를 자동생성->추천받은 영화를 출력하기 위해서
      msgDiv.className = "message " + sender; //각각의 div태그를 구분하기위해서 클래스명을 부여

      if (sender === "bot") {//AI가 보낸문자열이라면 
        let html = '<div class="movie-cards">';
        movies.forEach(m => { //추천받은 영화 5개중에서 하나씩 꺼내서
          // [핵심] '/' 기호를 HTML 줄바꿈 태그(<br>)로 변환하여 세로 정렬
          const formattedReason = m.reason.split('/').join('<br>');
          html += `
            <div class="movie-card">
              <img src="${m.poster}" alt="포스터">
              <div class="card-content">
                <p class="reason">${formattedReason}</p> 
                <div class="divider"></div>
                <h3>${m.title}</h3>
                <p class="rating">⭐ 평점: ${m.rating}</p>
                <p class="desc">${m.desc}</p>
              </div>
            </div>
          `;
        });
        html += '</div>';
        msgDiv.innerHTML = html;  //div태그를 만들어서 추천받은 영화목록을 출력
      } else {
        msgDiv.textContent = movies;
      }
      box.appendChild(msgDiv);//부모태그에 결합해서 출력하라
      box.scrollTop = box.scrollHeight; // 항상 최신 메시지 보기
    }

    function sendMessage() {
      const input = document.getElementById("prompt"); // 입력받기
      if(!input.value) return;//입력X 탈출 진행X
      addMessage(input.value, "user");
      // 서버의 SSE 엔드포인트와 연결
      const source = new EventSource(`/chat_stream?prompt=${encodeURIComponent(input.value)}`);
      input.value = "";//다시 입력받을 준비(초기화)
      source.onmessage = (e) => {
        const res = JSON.parse(e.data);
        if (res.status === "processing") addMessage(res.data, "bot");//AI가 영화사이트에서 받아온 데이터
        else if (res.status === "complete") source.close();
      };
    }
  </script>
</body>
</html>
